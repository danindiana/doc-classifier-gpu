<text text-anchor="middle" x="130" y="-284" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#ccccff">Key insight:</text>
<text text-anchor="middle" x="130" y="-273" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#ccccff">Both training and inference embed documents into</text>
<text text-anchor="middle" x="130" y="-262" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#ccccff">the SAME hypersphere using the SAME bge&#45;m3 model.</text>
<text text-anchor="middle" x="130" y="-251" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#ccccff">Training learns WHERE classes live on the sphere.</text>
<text text-anchor="middle" x="130" y="-240" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#ccccff">Inference finds WHERE a new doc lands, then</text>
<text text-anchor="middle" x="130" y="-229" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#ccccff">asks: which class region is it in?</text>
</g>
